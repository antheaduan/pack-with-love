# Netlify configuration for Pack with Love
# This is a plain static HTML site — there is no build step, so Netlify just
# publishes the files in the repository root exactly as they are.

[build]
  publish = "."      # serve the site from the repo root (index.html, etc.)
  command = ""       # no build command — nothing to compile

# Sensible security + caching headers for a static site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# CSS/JS share fixed filenames (styles.css, main.js), so they must always be
# revalidated — otherwise browsers serve a stale stylesheet after every edit.
# max-age=0 + must-revalidate = instant updates, with cheap 304 responses.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Images change rarely; cache for an hour but still revalidate afterwards.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
